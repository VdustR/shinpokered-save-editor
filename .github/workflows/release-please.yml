name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Maintains a running Release PR from Conventional Commits on main
      # (feat -> minor, fix -> patch, feat! -> major). Merging that PR bumps
      # package.json, updates CHANGELOG.md, tags vX.Y.Z, and publishes a
      # GitHub Release; the Pages deploy then ships the new version string.
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
